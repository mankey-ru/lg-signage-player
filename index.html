<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8">
	<title>Signage Player</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			background: #000;
			overflow: hidden;
			font-family: Arial, sans-serif;
		}

		#player-container {
			position: fixed;
			inset: 0;
		}

		#admin-overlay {
			display: none;
			position: fixed;
			inset: 0;
			background: rgba(0, 0, 0, 0.92);
			color: #fff;
			padding: 30px;
			z-index: 10000;
			overflow: auto;
		}
	</style>
</head>

<body>
	<div id="player-container"></div>

	<div id="admin-overlay">
		<h1>🔧 Admin Menu (Alt+A)</h1>
		<p><strong>ESC</strong> — закрыть</p>
		<button onclick="window.location.reload()">Перезапустить плеер</button>
		<br><br>
		<div id="status"></div>
	</div>

	<script type="module" src="dist/main.js"></script>
</body>

</html>
